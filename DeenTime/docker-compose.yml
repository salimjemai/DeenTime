version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deentime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/DeenTime.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=deentime;Username=postgres;Password=postgres"
      Auth__Issuer: deentime-local
      Auth__Audience: deentime-api
      Auth__SigningKey: "dev-local-signing-key-change-before-production-32ch"
      Cors__AllowedOrigins__0: "http://localhost:4200"
      SuperUser__Email: "admin@deentime.dev"
      SuperUser__Password: "Admin@1234"
      SuperUser__OrgName: "DeenTime Demo Mosque"
      SuperUser__AddressLine: "14300 Rountree Ranch Lane"
      SuperUser__City: "Austin"
      SuperUser__State: "TX"
      SuperUser__ZipCode: "78717"
      SuperUser__Phone: "4094543454"
      SuperUser__OrgEmail: "admin@deentime.dev"
      SuperUser__WebsiteUrl: "https://deentime.dev"
      SuperUser__Latitude: "30.5119418"
      SuperUser__Longitude: "-97.8177601"
      SuperUser__TimezoneId: "America/Chicago"
      SuperUser__Method: "ISNA"
      SuperUser__JuristicMethodAsr: "Other"
      SuperUser__MinutesAfterZawal: "5"
      SuperUser__MinutesAfterMaghrib: "1"
      SuperUser__KhutbahTimeMinutes: "20"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
